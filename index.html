<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deepanshu Kumar</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;0,900;1,400;1,600&family=Lora:ital,wght@0,400;0,500;1,400&family=DM+Mono:wght@300;400;500&display=swap" rel="stylesheet">
    <style>

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --cream: #F5F0E8;
            --ink:   #1C1C1C;
            --muted: #6B6055;
            --rule:  #D0C8BB;
            --red:   #8B1A1A;
        }

        html { font-size: 16px; scroll-behavior: smooth; }

        body {
            background: var(--cream);
            color: var(--ink);
            font-family: 'Lora', Georgia, serif;
            line-height: 1.7;
        }

        a { color: inherit; text-decoration: none; }

        /* ─── NAV ─── */
        nav {
            position: fixed;
            top: 0; left: 0; right: 0;
            z-index: 100;
            background: var(--cream);
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0 2.5rem;
            height: 64px;
        }

        .nav-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--ink);
        }

        .nav-name em {
            font-style: italic;
            font-weight: 400;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 1.8rem;
        }

        .nav-links {
            display: flex;
            gap: 1.8rem;
            list-style: none;
            align-items: center;
        }

        .nav-links a {
            font-family: 'Lora', serif;
            font-size: 0.92rem;
            color: var(--muted);
            transition: color 0.15s;
        }

        .nav-links a:hover { color: var(--ink); }

        .nav-cta {
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            background: var(--ink);
            color: var(--cream) !important;
            font-family: 'Lora', serif;
            font-size: 0.88rem;
            padding: 0.45rem 1.1rem;
            border-radius: 100px;
            transition: background 0.15s;
            white-space: nowrap;
        }

        .nav-cta:hover { background: var(--red); }

        .nav-toggle {
            width: 34px;
            height: 34px;
            border-radius: 8px;
            border: 1px solid var(--rule);
            background: transparent;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--muted);
            transition: background 0.15s, color 0.15s;
            flex-shrink: 0;
        }

        .nav-toggle:hover { background: var(--rule); color: var(--ink); }
        .nav-toggle svg { display: block; }

        /* Dark mode */
        body.dark {
            --cream: #141210;
            --ink:   #EDE8DF;
            --muted: #998F85;
            --rule:  #2E2A26;
            --red:   #C0392B;
        }

        /* ─── PAGE WRAPPER ─── */
        .page {
            max-width: 1080px;
            margin: 0 auto;
            padding: 0 2.5rem;
        }

    </style>
</head>
<body>

    <!-- NAV -->
    <nav>
        <a href="#" class="nav-name">Deepanshu <em>Kumar</em></a>
        <div class="nav-right">
            <ul class="nav-links">
                <li><a href="#work">Work</a></li>
                <li><a href="#playbook">Playbook</a></li>
            </ul>
            <a href="#contact" class="nav-cta">Say hello ↗</a>
            <button class="nav-toggle" id="themeToggle" aria-label="Toggle dark mode">
                <svg id="toggleIcon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                    <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                </svg>
            </button>
        </div>
    </nav>

    <div class="page">

        <!-- sections go here -->

    </div>

    <script>
        const btn  = document.getElementById('themeToggle');
        const icon = document.getElementById('toggleIcon');
        const sun  = '<circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>';
        const moon = '<path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>';
        btn.addEventListener('click', () => {
            document.body.classList.toggle('dark');
            icon.innerHTML = document.body.classList.contains('dark') ? sun : moon;
        });
    </script>
</body>
</html>
